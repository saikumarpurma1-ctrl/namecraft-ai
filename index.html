<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NameCraft AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo">🚀 NameCraft AI</div>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="pages/about.html">About</a>
        <a href="pages/privacy.html">Privacy</a>
        <a href="pages/contact.html">Contact</a>
    </div>
</nav>

<section class="hero">

    <h1>
        Generate Perfect <span>Names</span>
    </h1>

    <p>
        AI-inspired name generator for businesses, startups,
        YouTube channels, Instagram pages and more.
    </p>

    <div class="generator-box">

        <select id="category">
            <option>Business</option>
            <option>Startup</option>
            <option>YouTube</option>
            <option>Instagram</option>
            <option>Shop</option>
        </select>

        <input
        type="text"
        id="keyword"
        placeholder="Enter keyword (Coffee, Fitness, Tech)">

        <button onclick="generateNames()">
            Generate Names
        </button>

    </div>

</section>

<section class="results-section">

    <h2>Generated Names</h2>

    <div id="results"></div>

</section>
<section class="features">

    <div class="feature-card">
    ⚡ Instant Generation
    </div>

    <div class="feature-card">
    💎 Brandable Names
    </div>

    <div class="feature-card">
    🚀 Startup Ready
    </div>

    <div class="feature-card">
    📱 Social Media Names
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
